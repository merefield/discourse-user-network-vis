plugins:
  user_network_vis_enabled:
    type: bool
    default: true
    client: true
  user_network_vis_add_menu_item:
    type: bool
    default: true
    client: true
  user_network_vis_default_view:
    type: enum
    default: "3d"
    choices:
      - "2d"
      - "3d"
    client: true
  user_network_vis_node_radius:
    default: 6
    min: 3
    max: 20
    client: true
  user_network_vis_trust_level_0_color:
    default: "#4e79a7"
    type: color
    validator: "CssColorValidator"
    client: true
  user_network_vis_trust_level_1_color:
    default: "#f28e2c"
    type: color
    validator: "CssColorValidator"
    client: true
  user_network_vis_trust_level_2_color:
    default: "#e15759"
    type: color
    validator: "CssColorValidator"
    client: true
  user_network_vis_trust_level_3_color:
    default: "#76b7b2"
    type: color
    validator: "CssColorValidator"
    client: true
  user_network_vis_trust_level_4_color:
    default: "#59a14f"
    type: color
    validator: "CssColorValidator"
    client: true
  user_network_vis_node_charge_strength:
    default: 700
    min: 10
    max: 2000
    client: true
  user_network_vis_minimum_trust_level:
    default: 0
    max: 4
    min: 0
  user_network_vis_maximum_last_seen_years:
    default: 10
    min: 1
  user_network_vis_reply_multiplier:
    default: 2
    max: 4
    min: 1
  user_network_vis_link_score_threshold:
    default: 0
    min: 0
